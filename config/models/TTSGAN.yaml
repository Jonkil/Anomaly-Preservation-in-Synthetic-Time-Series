model: TTSGAN
framework: pytorch

# Fixed training defaults (overridable via env vars / FINAL_TRAIN_EPOCHS)
iterations: 5000
batch_size: 128
d_update: 3
dropout: 0.1

# Phase 2 search space (preprocessing fixed from Phase 1 winner)
phase2_search_space:
  latent_dim:
    type: categorical
    values: [64, 100, 128]
  embed_dim:
    type: categorical
    values: [16, 32, 64]
  depth:
    type: categorical
    values: [2, 3, 4]
  num_heads:
    type: categorical
    values: [4, 8]
  lr_g:
    type: loguniform
    low: 1.0e-5
    high: 1.0e-3
  lr_d:
    type: loguniform
    low: 1.0e-5
    high: 1.0e-3
